<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ferragem & Concreto — Acesso</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="layout">

  <!-- LEFT: Hero -->
  <div class="left">
    <div class="bg-image"></div>
    <div class="bg-overlay"></div>
    <div class="left-content">
      <div>
        <div class="badge">Construindo desde 2000</div>
      </div>
      <div class="left-footer">
        <h1 class="headline">
          Obras que<br>
          resistem ao<br>
          <em>tempo.</em>
        </h1>
        <p class="tagline">Materiais de alta performance para projetos que exigem precisão, durabilidade e confiança.</p>
        <!-- <div class="stats">
          <div class="stat">
            <div class="stat-num">340+</div>
            <div class="stat-label">Obras entregues</div>
          </div>
          <div class="stat">
            <div class="stat-num">27</div>
            <div class="stat-label">Anos de mercado</div>
          </div>
          <div class="stat">
            <div class="stat-num">98%</div>
            <div class="stat-label">Clientes satisfeitos</div>
          </div>
        </div> -->
      </div>
    </div>
  </div>

  <!-- RIGHT: Login Form -->
  <div class="right">
    <div class="right-top">
      <a href="#" class="logo">
        <div class="logo-mark">Ideal</div>
        <div class="logo-text">Soluções &amp;<br><span>Elétricas</span></div>
      </a>
      <!-- <a href="#" class="nav-link">Sobre</a> -->
    </div>

    <div class="right-content">
      <div class="form-heading">
        <h2 class="form-title">Acesse sua<br><em>área exclusiva</em></h2>
        <p class="form-sub">Acompanhe obras, contratos e documentações em tempo real.</p>
      </div>

      <div class="field">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com.br">
      </div>

      <div class="field field-password">
        <label for="senha">Senha</label>
        <div class="password-wrapper">
          <input type="password" id="senha" placeholder="••••••••">
          <button type="button" class="password-toggle" aria-label="Mostrar senha">Mostrar</button>
        </div>
      </div>

      <div class="form-row">
        <label class="checkbox-label">
          <input type="checkbox">
          <span>Manter conectado</span>
        </label>
        <a href="#" class="forgot">Esqueceu a senha?</a>
      </div>

      <button class="btn-submit">Entrar</button>

    </div>
  </div>

</div>

<script>
  const passwordInput = document.getElementById('senha');
  const passwordToggle = document.querySelector('.password-toggle');

  passwordToggle.addEventListener('click', () => {
    const isPassword = passwordInput.type === 'password';
    passwordInput.type = isPassword ? 'text' : 'password';
    passwordToggle.textContent = isPassword ? 'Ocultar' : 'Mostrar';
    passwordToggle.setAttribute('aria-label', isPassword ? 'Ocultar senha' : 'Mostrar senha');
  });
</script>
</body>
</html>
